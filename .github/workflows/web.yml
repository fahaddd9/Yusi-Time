name: Web CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
    - uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
        cache-dependency-path: './web/pnpm-lock.yaml'
        
    - name: Install dependencies
      run: pnpm install
      
    - name: Lint
      run: pnpm eslint .
      
    - name: Type check
      run: pnpm tsc --noEmit
      
    - name: Build
      run: pnpm build
