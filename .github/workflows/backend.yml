name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry config virtualenvs.create false
        poetry install --with dev
        
    - name: Lint with Ruff
      run: |
        ruff check .
        
    - name: Run Alembic migrations
      run: echo "Skipping actual DB migration in scaffold step, would be 'alembic upgrade head'"
        
    - name: Test with pytest
      env:
        DATABASE_URL: "postgresql+asyncpg://dummy:dummy@localhost:5432/dummy_db"
        TEST_DATABASE_URL: "postgresql+asyncpg://dummy:dummy@localhost:5432/dummy_test_db"
        JWT_SECRET: "super_secret_dummy_key_for_testing_only"
        JWT_REFRESH_SECRET: "super_secret_dummy_refresh_key_for_testing"
        GOOGLE_CLIENT_ID: "dummy_google_id"
        GOOGLE_CLIENT_SECRET: "dummy_google_secret"
        AWS_ACCESS_KEY_ID: "dummy_aws_key"
        AWS_SECRET_ACCESS_KEY: "dummy_aws_secret"
        FRONTEND_URL: "http://localhost:3000"
      run: |
        pytest --cov=app tests/
