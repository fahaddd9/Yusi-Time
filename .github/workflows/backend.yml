name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # 1. ADDED: Spin up a temporary Postgres database for the tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: dummy
          POSTGRES_PASSWORD: dummy
          POSTGRES_DB: dummy_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry config virtualenvs.create false
        poetry install --with dev
        
    - name: Lint with Ruff
      run: |
        ruff check .
        
    - name: Run Alembic migrations
      run: echo "Skipping actual DB migration in scaffold step, would be 'alembic upgrade head'"
        
    - name: Test with pytest
      env:
        # 2. UPDATED: Changed localhost to 127.0.0.1 to match your local setup
        DATABASE_URL: "postgresql+asyncpg://dummy:dummy@127.0.0.1:5432/dummy_db"
        TEST_DATABASE_URL: "postgresql+asyncpg://dummy:dummy@127.0.0.1:5432/dummy_test_db"
        JWT_SECRET: "super_secret_dummy_key_for_testing_only"
        JWT_REFRESH_SECRET: "super_secret_dummy_refresh_key_for_testing"
        GOOGLE_CLIENT_ID: "dummy_google_id"
        GOOGLE_CLIENT_SECRET: "dummy_google_secret"
        AWS_ACCESS_KEY_ID: "dummy_aws_key"
        AWS_SECRET_ACCESS_KEY: "dummy_aws_secret"
        FRONTEND_URL: "http://localhost:3000"
      run: |
        pytest --cov=app tests/